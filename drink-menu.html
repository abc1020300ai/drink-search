        }

        }

        }

            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

            margin-bottom: 20px;
        }

            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            min-height: 100px;
            resize: vertical;
            font-family: inherit;
            margin-bottom: 15px;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .btn-add {
            background: #4CAF50;
            color: white;
        }
        
        .btn-add:hover {
            background: #45a049;
        }
        
        .btn-delete {
            background: #f44336;
            color: white;
            padding: 8px 16px;
            font-size: 14px;
        }
        
        .btn-delete:hover {
            background: #da190b;
        }
        
        .search-box {
            margin-bottom: 20px;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .item-list {
            list-style: none;
        }
        
        .item {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }
        
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .item-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        
        .item-method {
            color: #666;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        
        .empty-message {
            text-align: center;
            color: #999;
            padding: 30px;
            font-size: 16px;
        }
        
        .count {
            text-align: center;
            color: white;
            margin-top: 10px;
            font-size: 14px;
        }
        
        }
        
        .arrow {
            transition: transform 0.3s;
        }
        
        .arrow.up {

        }

        function renderProducts(filter = '') {
            const itemList = document.getElementById('itemList');
            const count = document.getElementById('count');
            
            const filteredProducts = products.filter(p => 
                p.name.toLowerCase().includes(filter)
            );
            
            if (filteredProducts.length === 0) {
                itemList.innerHTML = '<p class="empty-message">暫無品項</p>';
                count.textContent = '';
                return;
            }
            
            itemList.innerHTML = filteredProducts.map((product, index) => `
                <li class="item">
                    <div class="item-header">
                        <span class="item-name">${product.name}</span>
                    </div>
                    <p class="item-method">${product.method.replace("☕ 冷飲做法：", "<span class=\"cold-title\">☕ 冷飲做法：</span>").replace("🔥 熱飲做法：", "<span class=\"hot-title\">🔥 熱飲做法：</span>")}</p>
                </li>
            `).join('');
            
            count.textContent = '共 ' + filteredProducts.length + ' 項';
        }



        

        function filterProducts() {
            const searchTerm = document.getElementById("searchInput").value.toLowerCase();
            renderProducts(searchTerm);
        }
renderProducts();
