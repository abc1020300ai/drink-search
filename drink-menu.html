<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍵 飲品製作管理系統</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            min-height: 100px;
            resize: vertical;
            font-family: inherit;
            margin-bottom: 15px;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .btn-add {
            background: #4CAF50;
            color: white;
        }
        
        .btn-add:hover {
            background: #45a049;
        }
        
        .btn-delete {
            background: #f44336;
            color: white;
            padding: 8px 16px;
            font-size: 14px;
        }
        
        .btn-delete:hover {
            background: #da190b;
        }
        
        .search-box {
            margin-bottom: 20px;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .item-list {
            list-style: none;
        }
        
        .item {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }
        
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .item-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        
        .item-method {
            color: #666;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        
        .empty-message {
            text-align: center;
            color: #999;
            padding: 30px;
            font-size: 16px;
        }
        
        .count {
            text-align: center;
            color: white;
            margin-top: 10px;
            font-size: 14px;
        }
        
        .admin-panel {
            background: #f0f0f0;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .admin-header {
            background: #333;
            color: white;
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }
        
        .admin-header:hover {
            background: #444;
        }
        
        .admin-content {
            padding: 20px;
            display: none;
        }
        
        .admin-content.active {
            display: block;
        }
        
        .arrow {
            transition: transform 0.3s;
        }
        
        .arrow.up {
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍵 飲品製作管理系統</h1>
        
        <div class="card">
            <div class="admin-panel">
                <div class="admin-header" onclick="toggleAdmin()">

                </div>
                <div class="admin-content" id="adminContent">

                    <div class="input-group">
                        <input type="text" id="productName" placeholder="輸入商品名稱...">

                    </div>
                    <textarea id="productMethod" placeholder="輸入製作方式...&#10;例如：&#10;1. 拆開糖漿袋&#10;2. 按咖啡機「冰拿鐵(大)」鍵一次&#10;3. 倒入黃色包裝的冰塊&#10;4. 封口並搖勻"></textarea>
                </div>
            </div>
        </div>
        
        <div class="card">

            <ul class="item-list" id="itemList"></ul>
            <p class="count" id="count"></p>

        function renderProducts(filter = '') {
        function renderProducts(filter = '') {
            const itemList = document.getElementById('itemList');
            const count = document.getElementById('count');
            
            const filteredProducts = products.filter(p => 
                p.name.toLowerCase().includes(filter)
            );
            
            if (filteredProducts.length === 0) {
                itemList.innerHTML = '<p class="empty-message">暫無品項</p>';
                count.textContent = '';
                return;
            }
            
            itemList.innerHTML = filteredProducts.map((product, index) => `
                <li class="item">
                    <div class="item-header">
                        <span class="item-name">${product.name}</span>
                        ${isUnlocked ? '<button class="btn-delete" onclick="deleteProduct(' + index + ')">刪除</button>' : ''}
                    </div>
                    <p class="item-method">${product.method}</p>
                </li>
            `).join('');
            
            count.textContent = '共 ' + filteredProducts.length + ' 項';
        }

        function addProduct() {
            const name = document.getElementById('productName').value.trim();
            const method = document.getElementById('productMethod').value.trim();
            
            if (!name) {
                alert('請輸入商品名稱！');
                return;
            }
            
            if (!method) {
                alert('請輸入製作方式！');
                return;
            }
            
            const exists = products.some(p => p.name === name);
            if (exists) {
                alert('此商品已存在！');
                return;
            }
            
            products.push({ name: name, method: method });
            
            document.getElementById('productName').value = '';
            document.getElementById('productMethod').value = '';
            
            alert('新增成功！');
            renderProducts(document.getElementById('searchInput').value.toLowerCase());
        }

        function deleteProduct(index) {
            if (confirm('確定要刪除這個品項嗎？')) {
                products.splice(index, 1);
                renderProducts(document.getElementById('searchInput').value.toLowerCase());
            }
        }

        function filterProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            renderProducts(searchTerm);
        }

        function toggleAdmin() {
            const content = document.getElementById('adminContent');
            const isActive = content.classList.contains('active');
            
            if (isActive) {
                content.classList.remove('active');
                document.getElementById('adminArrow').classList.remove('up');
                isUnlocked = false;
                renderProducts(document.getElementById('searchInput').value.toLowerCase());
            } else {
                const password = prompt('請輸入管理密碼：');
                if (password === ADMIN_PASSWORD) {
                    isUnlocked = true;
                    content.classList.add('active');
                    document.getElementById('adminArrow').classList.add('up');
                    renderProducts(document.getElementById('searchInput').value.toLowerCase());
                } else if (password !== null) {
                    alert('密碼錯誤！');
                }
            }
        }

        renderProducts();
    </script>
