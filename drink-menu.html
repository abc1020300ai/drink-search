        }
        
        input[type="text"]:focus {

            border-color: #667eea;
        }
        
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            min-height: 100px;
            resize: vertical;
            font-family: inherit;
            margin-bottom: 15px;
        }
        
        textarea:focus {

            border-color: #667eea;
        }
        
        button {

            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;

        .item-list {

        }
        
        .item {
            background: #f9f9f9;

            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }
        
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .item-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        
        .item-method {

            line-height: 1.6;
            white-space: pre-wrap;
        }

            text-align: center;
            color: #999;

        }

            text-align: center;

            margin-top: 10px;

        }

            background: #f0f0f0;

            margin-bottom: 20px;

        function renderProducts(filter = '') {
            const itemList = document.getElementById('itemList');
            const count = document.getElementById('count');
            
            const filteredProducts = products.filter(p => 
                p.name.toLowerCase().includes(filter)
            );
            
            if (filteredProducts.length === 0) {
                itemList.innerHTML = '<p class="empty-message">暫無品項</p>';
                count.textContent = '';
                return;
            }
            
            itemList.innerHTML = filteredProducts.map((product, index) => `
                <li class="item">
                    <div class="item-header">
                        <span class="item-name">${product.name}</span>
                        ${isUnlocked ? '<button class="btn-delete" onclick="deleteProduct(' + index + ')">刪除</button>' : ''}
                    </div>
                    <p class="item-method">${product.method}</p>
                </li>
            `).join('');
            
            count.textContent = '共 ' + filteredProducts.length + ' 項';
        }

        function addProduct() {
            const name = document.getElementById('productName').value.trim();
            const method = document.getElementById('productMethod').value.trim();
            
            if (!name) {
                alert('請輸入商品名稱！');
                return;
            }
            
            if (!method) {
                alert('請輸入製作方式！');
                return;
            }
            
            const exists = products.some(p => p.name === name);
            if (exists) {
                alert('此商品已存在！');
                return;
            }
            
            products.push({ name: name, method: method });
            
            document.getElementById('productName').value = '';
            document.getElementById('productMethod').value = '';
            
            alert('新增成功！');
            renderProducts(document.getElementById('searchInput').value.toLowerCase());
        }

        function deleteProduct(index) {
            if (confirm('確定要刪除這個品項嗎？')) {
                products.splice(index, 1);
                renderProducts(document.getElementById('searchInput').value.toLowerCase());
            }
        }

        function filterProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            renderProducts(searchTerm);
        }

            if (isActive) {
                content.classList.remove('active');
                document.getElementById('adminArrow').classList.remove('up');
                isUnlocked = false;
                renderProducts(document.getElementById('searchInput').value.toLowerCase());
            } else {
                const password = prompt('請輸入管理密碼：');
                if (password === ADMIN_PASSWORD) {
                    isUnlocked = true;
                    content.classList.add('active');
                    document.getElementById('adminArrow').classList.add('up');
                    renderProducts(document.getElementById('searchInput').value.toLowerCase());
                } else if (password !== null) {
                    alert('密碼錯誤！');
                }
            }
        }

        renderProducts();
    </script>
</body>
</html>
